<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login & Sign Up</title>
    <link rel="stylesheet" href="/CSS/Login.css" />
    <script
      src="https://kit.fontawesome.com/6892feb0b7.js"
      crossorigin="anonymous"
      defer
    ></script>
  </head>

  <body>
    <div class="wrapper" id="formWrapper">
      <!-- Login Form -->
      <div class="form-container login">
        <h2>Login</h2>
        <form id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email..." required />
          <input
            type="password"
            id="loginPassword"
            placeholder="Password"
            required
          />
          <div class="forgot-password" tabindex="0">
            <a href="for-pass.html">Forget password ?</a>
          </div>
          <button type="submit" class="submit-btn">Login</button>
        </form>
      </div>

      <!-- Signup Form -->
      <div class="form-container signin">
        <h2>Sign Up</h2>
        <form id="signupForm">
          <input
            type="text"
            id="signupUsername"
            placeholder="Username"
            required
          />
          <input type="email" id="signupEmail" placeholder="Email" required />
          <div class="pass">
            <input
              type="password"
              id="signupPassword"
              placeholder="Password"
              required
            />
            <button type="button" id="show-btn">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <div class="con-pass">
            <input
              type="password"
              id="signupConfirm"
              placeholder="Confirm Password"
              required
            />
            <button type="button" id="show-btn-2">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <label class="accept-terms">
            <input type="checkbox" required /> I accept the terms & conditions
          </label>
          <button type="submit" class="submit-btn">Sign Up</button>
        </form>
      </div>

      <!-- Blue Toggle -->
      <div class="toggle-container">
        <h2 id="toggleHeading">Don't have an account?</h2>
        <p id="toggleText">Sign up to get started!</p>
        <button class="switch-btn" id="toggleBtn">Sign Up</button>
      </div>
    </div>
    <div id="messagePopup" class="message-popup"></div>

    <!-- ================= Firebase & JS ================= -->
    <script src="/Js/Login.js"></script>
    <script type="module" src="/Js/Login-data.js"></script>
  </body>
</html>
